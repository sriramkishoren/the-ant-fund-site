<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title">
  <title id="title">The two-bucket retirement strategy — a safe stability bucket pays the bills, a growth bucket refills it once a year</title>
  <rect width="1600" height="900" fill="#FBF6EE"/>

  <defs>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M1 1 L9 6 L1 11 Z" fill="#E09A33"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M1 1 L9 6 L1 11 Z" fill="#0D5957"/>
    </marker>
    <linearGradient id="growthFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C44E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E09A33" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="stabilityFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15807D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#15807D" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="800" y="100" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-size="62" font-weight="600"
        fill="#0D5957" letter-spacing="-0.5">The two-bucket strategy</text>
  <text x="800" y="148" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="400"
        fill="#1C2826" opacity="0.7" letter-spacing="0.4">So a market crash never forces you to sell at the bottom to pay your bills</text>

  <!-- Growth bucket (right, large) -->
  <rect x="980" y="250" width="380" height="420" rx="18" fill="#FFFFFF" stroke="#E6E0D5" stroke-width="2"/>
  <rect x="980" y="330" width="380" height="340" rx="0" fill="url(#growthFill)"/>
  <rect x="980" y="250" width="380" height="420" rx="18" fill="none" stroke="#E09A33" stroke-width="2.5"/>
  <text x="1170" y="232" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0D5957">Growth bucket</text>
  <text x="1170" y="430" text-anchor="middle" font-family="Fraunces, serif" font-size="52" font-weight="600" fill="#0D5957">$1.2M</text>
  <text x="1170" y="470" text-anchor="middle" font-family="Inter, sans-serif" font-size="19" fill="#1C2826" opacity="0.8">stock index funds</text>
  <text x="1170" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#1C2826" opacity="0.6">grows for decades · swings wildly</text>

  <!-- Stability bucket (left, medium) -->
  <rect x="300" y="410" width="330" height="260" rx="18" fill="#FFFFFF" stroke="#E6E0D5" stroke-width="2"/>
  <rect x="300" y="470" width="330" height="200" rx="0" fill="url(#stabilityFill)"/>
  <rect x="300" y="410" width="330" height="260" rx="18" fill="none" stroke="#15807D" stroke-width="2.5"/>
  <text x="465" y="392" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0D5957">Stability bucket</text>
  <text x="465" y="540" text-anchor="middle" font-family="Fraunces, serif" font-size="46" font-weight="600" fill="#0D5957">$300k</text>
  <text x="465" y="576" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#1C2826" opacity="0.8">safe &amp; boring</text>
  <text x="465" y="602" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#1C2826" opacity="0.6">~5 years of bills</text>

  <!-- Refill arrow: growth -> stability -->
  <path d="M980 420 C 830 360, 720 360, 636 450" fill="none" stroke="#E09A33" stroke-width="3.5" marker-end="url(#arrowAmber)"/>
  <text x="800" y="352" text-anchor="middle" font-family="Inter, sans-serif" font-size="19" font-weight="600" fill="#E09A33">Refill once a year</text>
  <text x="800" y="376" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#1C2826" opacity="0.65">…unless stocks just crashed — then skip it</text>

  <!-- Tap: stability -> monthly bills -->
  <path d="M465 670 L465 748" fill="none" stroke="#0D5957" stroke-width="3.5" marker-end="url(#arrowTeal)"/>
  <text x="700" y="712" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#0D5957">$5,000 / month, automatic</text>

  <!-- Monthly bills box -->
  <rect x="330" y="752" width="270" height="66" rx="12" fill="#FFFFFF" stroke="#E6E0D5" stroke-width="2"/>
  <text x="465" y="784" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#0D5957">Monthly bills</text>
  <text x="465" y="806" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.6">paid from checking</text>

  <!-- Caption -->
  <text x="1170" y="762" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#1C2826" opacity="0.65">You sell stocks on</text>
  <text x="1170" y="784" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#1C2826" opacity="0.65">your schedule —</text>
  <text x="1170" y="806" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0D5957">never the market's</text>
</svg>
