<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title">
  <title id="title">The Wheel — premium collected at every turn</title>
  <rect width="1600" height="900" fill="#FBF6EE"/>

  <!-- Title block, given clear vertical space above the diagram -->
  <text x="800" y="92" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-size="64" font-weight="600"
        fill="#0D5957" letter-spacing="-0.5">The Wheel</text>
  <text x="800" y="138" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400"
        fill="#1C2826" opacity="0.7" letter-spacing="0.4">Premium collected at every turn</text>

  <!-- Cycle area: center at (800, 540), radius 240. Top node clears the subtitle by ~60px. -->

  <!-- Guide circle: very subtle, just enough to read as a loop -->
  <circle cx="800" cy="540" r="240"
          fill="none" stroke="#15807D" stroke-width="1.5" opacity="0.18"/>

  <!-- 4 station nodes on the cardinal points of the guide circle -->
  <!-- Top: Sell CSP -->
  <g>
    <circle cx="800" cy="300" r="74" fill="#15807D"/>
    <text x="800" y="296" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600"
          fill="#FBF6EE" letter-spacing="0.4">SELL</text>
    <text x="800" y="322" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600"
          fill="#FBF6EE" letter-spacing="0.4">CSP</text>
  </g>

  <!-- Right: Own shares -->
  <g>
    <circle cx="1040" cy="540" r="74" fill="#E09A33"/>
    <text x="1040" y="536" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600"
          fill="#1C2826" letter-spacing="0.4">OWN</text>
    <text x="1040" y="562" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600"
          fill="#1C2826" letter-spacing="0.4">SHARES</text>
  </g>

  <!-- Bottom: Sell CC -->
  <g>
    <circle cx="800" cy="780" r="74" fill="#0D5957"/>
    <text x="800" y="776" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600"
          fill="#FBF6EE" letter-spacing="0.4">SELL</text>
    <text x="800" y="802" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600"
          fill="#FBF6EE" letter-spacing="0.4">CC</text>
  </g>

  <!-- Left: Cash -->
  <g>
    <circle cx="560" cy="540" r="74" fill="#F2C44E"/>
    <text x="560" y="548" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600"
          fill="#1C2826" letter-spacing="0.4">CASH</text>
  </g>

  <!-- Four small directional chevrons on the cycle, pointing clockwise.
       Positioned at 45° offsets (NE/SE/SW/NW), tangent to the guide circle.
       Chevron template: small triangle pointing right (+x), then rotated. -->
  <g fill="#0D5957">
    <!-- NE (between top and right): position (800 + 240*cos45, 540 - 240*sin45) = (970, 370), rotate 45° -->
    <polygon points="-9,-7 6,0 -9,7" transform="translate(970 370) rotate(45)"/>
    <!-- SE (between right and bottom): (970, 710), rotate 135° -->
    <polygon points="-9,-7 6,0 -9,7" transform="translate(970 710) rotate(135)"/>
    <!-- SW (between bottom and left): (630, 710), rotate 225° -->
    <polygon points="-9,-7 6,0 -9,7" transform="translate(630 710) rotate(225)"/>
    <!-- NW (between left and top): (630, 370), rotate 315° -->
    <polygon points="-9,-7 6,0 -9,7" transform="translate(630 370) rotate(315)"/>
  </g>

  <!-- Caption strip at the bottom, well clear of the bottom node -->
  <text x="800" y="870" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400"
        fill="#1C2826" opacity="0.55" letter-spacing="0.2">
    Cash-secured put &#8594; assignment &#8594; covered call &#8594; called away &#8594; repeat
  </text>
</svg>
