<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title">
  <title id="title">A fan of possible retirement futures — most succeed, some fail</title>
  <rect width="1600" height="900" fill="#FBF6EE"/>

  <!-- Title -->
  <text x="800" y="100" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-size="60" font-weight="600"
        fill="#0D5957" letter-spacing="-0.5">Will my money last?</text>
  <text x="800" y="146" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400"
        fill="#1C2826" opacity="0.7" letter-spacing="0.4">Ten thousand possible futures, fanning out from today</text>

  <!-- Plot area: x from 160 to 1440 (today → end), y inverted, top at 200, bottom at 760
       Origin point on the left: (160, 540). End range fans wide. -->

  <!-- Axes (subtle) -->
  <line x1="160" y1="760" x2="1440" y2="760" stroke="#1C2826" stroke-width="1.5" opacity="0.55"/>
  <line x1="160" y1="200" x2="160" y2="760" stroke="#1C2826" stroke-width="1.5" opacity="0.55"/>

  <!-- Zero line label -->
  <text x="148" y="765" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">$0</text>
  <!-- Starting balance marker -->
  <line x1="156" y1="540" x2="164" y2="540" stroke="#1C2826" stroke-width="1.5" opacity="0.6"/>
  <text x="148" y="545" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">today</text>

  <!-- X labels -->
  <text x="160" y="790" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">today</text>
  <text x="1440" y="790" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">end of plan</text>

  <!-- A bunch of varied paths fanning out. Generated by hand so they look organic.
       Most curve upward (success), a few drift low, one or two hit zero. -->
  <g stroke="#15807D" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- "Sample paths" group at low opacity -->
    <g opacity="0.18">
      <path d="M160 540 C 360 520, 580 510, 760 470 S 1100 410, 1440 360" />
      <path d="M160 540 C 340 535, 540 525, 760 500 S 1080 470, 1440 420" />
      <path d="M160 540 C 360 530, 580 510, 780 480 S 1120 430, 1440 380" />
      <path d="M160 540 C 320 545, 520 540, 740 520 S 1080 490, 1440 450" />
      <path d="M160 540 C 380 510, 600 480, 800 440 S 1140 370, 1440 300" />
      <path d="M160 540 C 360 525, 580 495, 760 460 S 1100 390, 1440 330" />
      <path d="M160 540 C 340 535, 540 530, 740 510 S 1080 480, 1440 440" />
      <path d="M160 540 C 360 520, 580 490, 780 460 S 1120 410, 1440 360" />
      <path d="M160 540 C 320 542, 520 545, 720 540 S 1080 525, 1440 500" />
      <path d="M160 540 C 340 530, 540 505, 740 470 S 1100 405, 1440 340" />
      <path d="M160 540 C 380 515, 600 485, 800 450 S 1140 380, 1440 310" />
      <path d="M160 540 C 320 530, 520 510, 720 490 S 1080 450, 1440 400" />
      <path d="M160 540 C 360 525, 580 495, 760 460 S 1100 400, 1440 350" />
      <path d="M160 540 C 360 530, 580 505, 760 470 S 1100 410, 1440 360" />
      <path d="M160 540 C 340 545, 540 545, 740 530 S 1080 505, 1440 470" />
    </g>

    <!-- Failed run: drops to zero -->
    <path d="M160 540 C 340 565, 520 610, 660 680 S 880 750, 1100 760 L 1440 760"
          stroke="#E09A33" stroke-width="2.5" opacity="0.85"/>

    <!-- A second "near-miss" path that bottoms low but stays positive -->
    <path d="M160 540 C 320 580, 520 620, 720 640 S 1040 670, 1440 690"
          stroke="#E09A33" stroke-width="2" opacity="0.55" stroke-dasharray="5 5"/>

    <!-- Median emphasized -->
    <path d="M160 540 C 360 525, 580 500, 760 470 S 1100 415, 1440 365"
          stroke="#0D5957" stroke-width="3.5" opacity="1"/>
  </g>

  <!-- Endpoints: small dots at terminal values for visual interest -->
  <g>
    <circle cx="1440" cy="360" r="6" fill="#0D5957"/>
    <circle cx="1440" cy="300" r="4" fill="#15807D" opacity="0.5"/>
    <circle cx="1440" cy="450" r="4" fill="#15807D" opacity="0.5"/>
    <circle cx="1440" cy="500" r="4" fill="#15807D" opacity="0.5"/>
    <circle cx="1440" cy="690" r="4" fill="#E09A33" opacity="0.7"/>
    <circle cx="1440" cy="760" r="5" fill="#E09A33"/>
  </g>

  <!-- Annotations -->
  <g font-family="Inter, sans-serif" font-size="13" fill="#1C2826">
    <text x="1454" y="364" font-weight="600" fill="#0D5957">Median path</text>
    <text x="1454" y="382" opacity="0.65" font-size="11">half of runs end above this</text>

    <text x="1454" y="694" font-weight="600" fill="#E09A33">Near miss</text>
    <text x="1454" y="712" opacity="0.65" font-size="11">survived but barely</text>

    <text x="1454" y="764" font-weight="600" fill="#E09A33">Failed run</text>
    <text x="1454" y="782" opacity="0.65" font-size="11">ran out of money early</text>
  </g>

  <!-- Caption -->
  <text x="800" y="850" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="15" font-weight="400"
        fill="#1C2826" opacity="0.6" letter-spacing="0.2">
    Each line is one simulated retirement. The Monte Carlo calculator runs thousands and counts how many survived.
  </text>
</svg>
