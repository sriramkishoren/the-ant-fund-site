<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title">
  <title id="title">The water-tank analogy: a deep well slowly refills a storage tank, and you drink only from the tap. The well is your growth bucket, the tank is your stability bucket, the tap is your monthly spending.</title>
  <rect width="1200" height="620" fill="#FBF6EE"/>

  <defs>
    <marker id="wtArrow" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M1 1 L9 6 L1 11 Z" fill="#1C2826" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">Think of it like a home water system</text>
  <text x="600" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">A deep well refills a storage tank; you drink from the tap. Your money works the same way.</text>

  <!-- WELL (growth) -->
  <g>
    <text x="240" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#E09A33">The well</text>
    <!-- well shaft -->
    <rect x="150" y="175" width="180" height="300" rx="6" fill="#FFFFFF" stroke="#E09A33" stroke-width="2.5"/>
    <rect x="150" y="285" width="180" height="190" rx="0" fill="#E09A33" fill-opacity="0.4"/>
    <!-- wavy water top -->
    <path d="M150 285 q 22 -12 45 0 t 45 0 t 45 0 t 45 0" fill="none" stroke="#E09A33" stroke-width="2" opacity="0.7"/>
    <text x="240" y="360" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#0D5957">Growth</text>
    <text x="240" y="388" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#0D5957">bucket</text>
    <text x="240" y="505" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">stock index funds</text>
    <text x="240" y="527" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.55">deep, powerful, slow</text>
  </g>

  <!-- Arrow well -> tank -->
  <line x1="340" y1="330" x2="470" y2="330" stroke="#1C2826" stroke-opacity="0.7" stroke-width="2.5" marker-end="url(#wtArrow)"/>
  <text x="405" y="316" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">refills</text>
  <text x="405" y="352" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.55">once a year</text>

  <!-- TANK (stability) -->
  <g>
    <text x="600" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#15807D">The storage tank</text>
    <rect x="500" y="230" width="200" height="200" rx="10" fill="#FFFFFF" stroke="#15807D" stroke-width="2.5"/>
    <rect x="500" y="300" width="200" height="130" rx="0" fill="#15807D" fill-opacity="0.28"/>
    <path d="M500 300 q 25 -10 50 0 t 50 0 t 50 0 t 50 0" fill="none" stroke="#15807D" stroke-width="2" opacity="0.6"/>
    <text x="600" y="330" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#0D5957">Stability</text>
    <text x="600" y="358" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#0D5957">bucket</text>
    <text x="600" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">~5 years of bills</text>
  </g>

  <!-- Arrow tank -> tap -->
  <line x1="710" y1="360" x2="840" y2="360" stroke="#1C2826" stroke-opacity="0.7" stroke-width="2.5" marker-end="url(#wtArrow)"/>
  <text x="775" y="346" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">flows to</text>

  <!-- TAP (spending) -->
  <g>
    <text x="985" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#0D5957">The tap</text>
    <!-- tap spout -->
    <path d="M900 300 h70 v-22 h20 v22 h10 a30 30 0 0 1 -30 30 h-40 a30 30 0 0 1 -30 -30 Z" fill="#0D5957" opacity="0.85"/>
    <!-- drips -->
    <circle cx="960" cy="372" r="5" fill="#15807D" opacity="0.7"/>
    <circle cx="960" cy="392" r="4" fill="#15807D" opacity="0.5"/>
    <text x="985" y="440" text-anchor="middle" font-family="Fraunces, serif" font-size="20" font-weight="600" fill="#0D5957">Monthly</text>
    <text x="985" y="466" text-anchor="middle" font-family="Fraunces, serif" font-size="20" font-weight="600" fill="#0D5957">spending</text>
    <text x="985" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">$5,000 to checking</text>
    <text x="985" y="522" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.55">what you actually live on</text>
  </g>

  <!-- Bottom insight -->
  <rect x="150" y="558" width="900" height="44" rx="10" fill="#FFFFFF" stroke="#E6E0D5"/>
  <text x="600" y="586" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">
    <tspan font-weight="600" fill="#0D5957">The magic is the separation:</tspan> because the tank already holds years of bills, a dry spell at the well never leaves you thirsty.
  </text>
</svg>
