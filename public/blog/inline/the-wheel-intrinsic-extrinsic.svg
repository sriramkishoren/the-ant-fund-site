<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title">
  <title id="title">Intrinsic versus extrinsic value across three put strikes on a $192.71 stock</title>
  <rect width="1200" height="600" fill="#FBF6EE"/>

  <text x="600" y="48" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">Premium &#8800; income</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#1C2826" opacity="0.75">Three NVDA puts at the same expiration. Only the teal portion is harvestable via theta.</text>

  <!-- Three bars: OTM $185, ATM ~$192.50, ITM $200 -->
  <!-- Scaling: $11.00 max -> bar height 380px. So $1 = 34.5px -->
  <!-- Bars based at y=480 -->

  <!-- Bar 1: $185 put OTM, premium $4.50, all extrinsic -->
  <g>
    <!-- Extrinsic block (teal) -->
    <rect x="200" y="324" width="140" height="156" fill="#15807D"/>
    <text x="270" y="412" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FBF6EE">Extrinsic</text>
    <text x="270" y="432" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#FBF6EE" opacity="0.95">$4.50</text>
    <!-- Total label above -->
    <text x="270" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0D5957">$4.50</text>
    <!-- Strike label -->
    <text x="270" y="514" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1C2826">$185 strike</text>
    <text x="270" y="534" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">OTM</text>
  </g>

  <!-- Bar 2: ~$192.50 put ATM, premium $7.50, all extrinsic -->
  <g>
    <rect x="530" y="221" width="140" height="259" fill="#15807D"/>
    <text x="600" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FBF6EE">Extrinsic</text>
    <text x="600" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#FBF6EE" opacity="0.95">$7.50</text>
    <text x="600" y="207" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0D5957">$7.50</text>
    <text x="600" y="514" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1C2826">~$192.50 strike</text>
    <text x="600" y="534" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">ATM (~spot)</text>
  </g>

  <!-- Bar 3: $200 put ITM, premium $11.00 = $7.29 intrinsic + $3.71 extrinsic -->
  <g>
    <!-- Intrinsic (gray, bottom) — $7.29 = 251.5px -->
    <rect x="860" y="228" width="140" height="252" fill="#1C2826" opacity="0.55"/>
    <!-- Extrinsic (teal, top) — $3.71 = 128px -->
    <rect x="860" y="100" width="140" height="128" fill="#15807D"/>
    <text x="930" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FBF6EE">Extrinsic</text>
    <text x="930" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#FBF6EE" opacity="0.95">$3.71</text>
    <text x="930" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FBF6EE">Intrinsic</text>
    <text x="930" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#FBF6EE" opacity="0.95">$7.29</text>
    <text x="930" y="386" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#FBF6EE" opacity="0.85">(not income)</text>
    <text x="930" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0D5957">$11.00</text>
    <text x="930" y="514" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1C2826">$200 strike</text>
    <text x="930" y="534" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">ITM by $7.29</text>
  </g>

  <!-- Baseline -->
  <line x1="160" y1="480" x2="1060" y2="480" stroke="#1C2826" stroke-width="1.5"/>

  <!-- Legend, placed in the empty top-left to avoid colliding with the $11 label above the ITM bar -->
  <g transform="translate(120, 110)">
    <rect x="0" y="0" width="20" height="14" fill="#15807D"/>
    <text x="28" y="12" font-family="Inter, sans-serif" font-size="13" fill="#1C2826">Extrinsic (harvestable)</text>
    <rect x="0" y="22" width="20" height="14" fill="#1C2826" opacity="0.55"/>
    <text x="28" y="34" font-family="Inter, sans-serif" font-size="13" fill="#1C2826">Intrinsic (pegged to stock)</text>
  </g>

  <!-- Footer note -->
  <text x="600" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">Biggest premium &#8800; biggest income. Extrinsic value &#8212; not headline premium &#8212; is what theta lets you keep.</text>
</svg>
