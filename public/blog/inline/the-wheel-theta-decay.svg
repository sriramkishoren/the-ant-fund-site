<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title">
  <title id="title">Theta decay: an out-of-the-money put price melting to zero over 35 days</title>
  <rect width="1200" height="600" fill="#FBF6EE"/>

  <text x="600" y="50" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">Theta decay isn&#8217;t linear — it accelerates</text>
  <text x="600" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#1C2826" opacity="0.75">An OTM put&#8217;s extrinsic value, stock held perfectly still</text>

  <!-- Chart area -->
  <!-- X axis: DTE from 35 (left) to 0 (right). 35 -> x=120, 0 -> x=1100 -->
  <!-- Y axis: price from $4.50 (top) to $0 (bottom). $4.50 -> y=140, $0 -> y=470 -->
  <!-- Axis lines -->
  <line x1="120" y1="470" x2="1100" y2="470" stroke="#1C2826" stroke-width="1.5"/>
  <line x1="120" y1="140" x2="120" y2="470" stroke="#1C2826" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <g font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">
    <text x="110" y="146" text-anchor="end">$4.50</text>
    <text x="110" y="220" text-anchor="end">$3.50</text>
    <text x="110" y="294" text-anchor="end">$2.50</text>
    <text x="110" y="368" text-anchor="end">$1.50</text>
    <text x="110" y="442" text-anchor="end">$0.50</text>
    <text x="110" y="474" text-anchor="end">$0</text>
  </g>
  <!-- Y axis title -->
  <text x="50" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7" transform="rotate(-90 50 305)">Put price (extrinsic)</text>

  <!-- X axis labels (DTE) -->
  <g font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">
    <text x="120" y="494" text-anchor="middle">35</text>
    <text x="316" y="494" text-anchor="middle">28</text>
    <text x="512" y="494" text-anchor="middle">21</text>
    <text x="708" y="494" text-anchor="middle">14</text>
    <text x="904" y="494" text-anchor="middle">7</text>
    <text x="1044" y="494" text-anchor="middle">2</text>
    <text x="1100" y="494" text-anchor="middle">0</text>
  </g>
  <text x="610" y="528" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">Days to expiration &#8594;</text>

  <!-- Gridlines (faint) -->
  <g stroke="#0D5957" stroke-width="1" opacity="0.08">
    <line x1="120" y1="220" x2="1100" y2="220"/>
    <line x1="120" y1="294" x2="1100" y2="294"/>
    <line x1="120" y1="368" x2="1100" y2="368"/>
    <line x1="120" y1="442" x2="1100" y2="442"/>
  </g>

  <!-- Decay curve: data points from the table in §10 -->
  <!-- Maps: DTE -> x, price -> y (linear scaling). y = 470 - (price/4.5)*330 = 470 - 73.33*price -->
  <!-- 35d, 4.50  -> (120, 140) -->
  <!-- 28d, 3.80  -> (316, 191.3) -->
  <!-- 21d, 3.05  -> (512, 246.3) -->
  <!-- 14d, 2.20  -> (708, 308.7) -->
  <!-- 7d, 1.25   -> (904, 378.3) -->
  <!-- 2d, 0.45   -> (1044, 437) -->
  <!-- 0d, 0.00   -> (1100, 470) -->
  <path d="M 120 140 Q 240 165, 316 191 T 512 246 T 708 309 T 904 378 T 1044 437 L 1100 470"
        fill="none" stroke="#15807D" stroke-width="4" stroke-linecap="round"/>

  <!-- Plot the data points -->
  <g fill="#15807D">
    <circle cx="120" cy="140" r="6"/>
    <circle cx="316" cy="191" r="6"/>
    <circle cx="512" cy="246" r="6"/>
    <circle cx="708" cy="309" r="6"/>
    <circle cx="904" cy="378" r="6"/>
    <circle cx="1044" cy="437" r="6"/>
    <circle cx="1100" cy="470" r="6"/>
  </g>

  <!-- Annotation: gentle early decay -->
  <g>
    <rect x="200" y="100" width="240" height="48" rx="6" fill="#FBF6EE" stroke="#15807D" stroke-width="1"/>
    <text x="320" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0D5957">Slow decay early</text>
    <text x="320" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.75">~$0.10/day around 35 DTE</text>
    <line x1="280" y1="148" x2="220" y2="180" stroke="#15807D" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Annotation: gamma week -->
  <g>
    <rect x="850" y="180" width="250" height="48" rx="6" fill="#FBF6EE" stroke="#E09A33" stroke-width="1"/>
    <text x="975" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#E09A33">Fast decay (and high gamma)</text>
    <text x="975" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.75">~$0.30/day in the final days</text>
    <line x1="1000" y1="228" x2="1010" y2="370" stroke="#E09A33" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Footer note -->
  <text x="600" y="572" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.6">The 50% rule is essentially: harvest the gentle middle, hand the position back before the final week.</text>
</svg>
