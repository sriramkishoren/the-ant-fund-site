<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title">
  <title id="title">Support and resistance versus trend lines. On the left, price oscillates between a flat horizontal resistance level above and a flat horizontal support level below. On the right, the same behaviour happens along angled parallel lines — a rising channel where every high touches the upper trend line and every low touches the lower one, making higher highs and higher lows.</title>
  <rect width="1200" height="640" fill="#FBF6EE"/>

  <text x="600" y="44" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">Support &amp; resistance — and trend lines</text>
  <text x="600" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">Identical behaviour. Flat levels we call support/resistance; angled ones we call trend lines.</text>

  <!-- ── LEFT: horizontal support & resistance ── -->
  <g>
    <rect x="60" y="105" width="520" height="395" rx="14" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="320" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#0D5957">Flat → support &amp; resistance</text>

    <!-- Resistance -->
    <line x1="95" y1="185" x2="545" y2="185" stroke="#E09A33" stroke-width="3"/>
    <text x="100" y="175" font-family="Inter, sans-serif" font-size="12.5" font-weight="700" fill="#E09A33">RESISTANCE — profit-taking caps the rally</text>

    <!-- Support -->
    <line x1="95" y1="420" x2="545" y2="420" stroke="#15807D" stroke-width="3"/>
    <text x="100" y="442" font-family="Inter, sans-serif" font-size="12.5" font-weight="700" fill="#15807D">SUPPORT — buyers step in and halt the fall</text>

    <!-- Price: every high pinned to resistance, every low pinned to support -->
    <polyline points="105,405 165,187 225,418 290,187 350,418 415,187 480,418 545,300"
              fill="none" stroke="#0D5957" stroke-width="2.5" stroke-linejoin="round"/>
    <g fill="#E09A33">
      <circle cx="165" cy="187" r="4.5"/><circle cx="290" cy="187" r="4.5"/><circle cx="415" cy="187" r="4.5"/>
    </g>
    <g fill="#15807D">
      <circle cx="225" cy="418" r="4.5"/><circle cx="350" cy="418" r="4.5"/><circle cx="480" cy="418" r="4.5"/>
    </g>

    <text x="320" y="472" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.75">The same two prices, over and over — until one side wins</text>
    <text x="320" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.75">and price breaks out above, or breaks down below.</text>
  </g>

  <!-- ── RIGHT: angled trend lines (a rising channel) ── -->
  <g>
    <rect x="620" y="105" width="520" height="395" rx="14" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="880" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#0D5957">Angled → trend lines (a rising channel)</text>

    <!-- Upper trend line: (650,380) → (1110,175) -->
    <line x1="650" y1="380" x2="1110" y2="175" stroke="#E09A33" stroke-width="3"/>
    <text x="1105" y="163" text-anchor="end" font-family="Inter, sans-serif" font-size="12.5" font-weight="700" fill="#E09A33">rising resistance</text>

    <!-- Lower trend line: parallel, (650,440) → (1110,235) -->
    <line x1="650" y1="440" x2="1110" y2="235" stroke="#15807D" stroke-width="3"/>
    <text x="1105" y="260" text-anchor="end" font-family="Inter, sans-serif" font-size="12.5" font-weight="700" fill="#15807D">rising support</text>

    <!-- Price: highs computed to land ON the upper line, lows ON the lower line -->
    <polyline points="665,433 725,347 785,380 845,293 905,326 965,240 1025,273 1085,186"
              fill="none" stroke="#0D5957" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Highs touching the upper line -->
    <g fill="#E09A33">
      <circle cx="725" cy="347" r="4.5"/><circle cx="845" cy="293" r="4.5"/>
      <circle cx="965" cy="240" r="4.5"/><circle cx="1085" cy="186" r="4.5"/>
    </g>
    <!-- Lows touching the lower line -->
    <g fill="#15807D">
      <circle cx="665" cy="433" r="4.5"/><circle cx="785" cy="380" r="4.5"/>
      <circle cx="905" cy="326" r="4.5"/><circle cx="1025" cy="273" r="4.5"/>
    </g>

    <text x="880" y="472" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.75">Higher highs <tspan font-weight="600">and</tspan> higher lows, riding between two parallel lines:</text>
    <text x="880" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.75">people keep buying at ever-higher prices — demand is steadily rising.</text>
  </g>

  <!-- Relationship note -->
  <rect x="60" y="522" width="1080" height="92" rx="12" fill="#FFFFFF" stroke="#0D5957" stroke-width="1.5"/>
  <text x="600" y="552" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#0D5957">So how do these relate to chart patterns?</text>
  <text x="600" y="578" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">Support and resistance are the <tspan font-style="italic">ingredients</tspan>; the chart pattern is the <tspan font-style="italic">dish</tspan>.</text>
  <text x="600" y="599" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">Every pattern has them built in — how the two lines converge, run parallel, or flatten out <tspan font-style="italic">is</tspan> the pattern.</text>
</svg>
