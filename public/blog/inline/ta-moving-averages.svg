<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="title">
  <title id="title">The 50-day and 200-day moving averages. Price above the 200-day is a bull market; a sustained break below it marks bear-market conditions, as in the 2020 COVID crash and the 2022 rate-hike selloff. A golden cross is when the 50-day crosses above the 200-day (bullish); a death cross is when it crosses below (bearish). Both are lagging signals.</title>
  <rect width="1200" height="660" fill="#FBF6EE"/>

  <text x="600" y="46" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">The 50-day and 200-day moving averages</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">The simplest signal framework there is: above the line = bullish, below = bearish.</text>

  <!-- Plot area -->
  <line x1="90" y1="470" x2="1130" y2="470" stroke="#1C2826" stroke-width="1.5" opacity="0.4"/>

  <!-- Shaded bear zone (below 200-day, during the drawdown) -->
  <rect x="430" y="120" width="150" height="350" fill="#E09A33" opacity="0.08"/>

  <!-- 200-day MA (slow, smooth) -->
  <path d="M90 390 C 250 360, 350 330, 470 320 S 700 330, 860 280 S 1050 220, 1130 190"
        fill="none" stroke="#0D5957" stroke-width="3.5"/>
  <text x="1140" y="186" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0D5957">200</text>

  <!-- 50-day MA (faster, wigglier) -->
  <path d="M90 400 C 200 350, 300 300, 400 280 C 460 270, 500 380, 560 400 C 620 415, 700 330, 800 280 C 900 235, 1000 200, 1130 155"
        fill="none" stroke="#15807D" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="1140" y="152" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#15807D">50</text>

  <!-- Price line (noisy, around the MAs) -->
  <path d="M90 410 C 160 355, 230 320, 300 285 C 350 262, 380 250, 410 262 C 440 278, 455 350, 490 410 C 520 458, 545 452, 575 420 C 610 385, 650 330, 700 305 C 760 275, 820 265, 880 245 C 960 218, 1040 180, 1130 140"
        fill="none" stroke="#1C2826" stroke-width="2" opacity="0.5"/>

  <!-- Death cross marker (~x=470 where 50 crosses below 200) -->
  <circle cx="470" cy="322" r="8" fill="none" stroke="#E09A33" stroke-width="3"/>
  <line x1="470" y1="314" x2="470" y2="200" stroke="#E09A33" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="470" y="188" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#E09A33">DEATH CROSS</text>
  <text x="470" y="168" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#1C2826" opacity="0.65">50 crosses below 200 → bearish</text>

  <!-- Golden cross marker (~x=690 where 50 crosses back above 200) -->
  <circle cx="700" cy="322" r="8" fill="none" stroke="#15807D" stroke-width="3"/>
  <line x1="700" y1="330" x2="700" y2="420" stroke="#15807D" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="700" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#15807D">GOLDEN CROSS</text>
  <text x="700" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#1C2826" opacity="0.65">50 crosses above 200 → bullish</text>

  <!-- Bear zone label -->
  <text x="505" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="700" fill="#E09A33">bear-market conditions</text>
  <text x="505" y="153" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.6">price sustained below the 200</text>

  <!-- History note -->
  <rect x="90" y="500" width="510" height="130" rx="12" fill="#FFFFFF" stroke="#E6E0D5"/>
  <text x="112" y="528" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0D5957">When the S&amp;P broke its 200-day</text>
  <text x="112" y="554" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">• 2020 — the COVID crash (genuine fear)</text>
  <text x="112" y="578" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">• 2022 — the Fed raising interest rates</text>
  <text x="112" y="602" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">• tariff-driven selloffs</text>
  <text x="112" y="622" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.65">Most of the time, though, price just <tspan font-style="italic">touches</tspan> the 200 and bounces.</text>

  <rect x="620" y="500" width="510" height="130" rx="12" fill="#FFFFFF" stroke="#E6E0D5"/>
  <text x="642" y="528" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0D5957">Do the crosses work?</text>
  <text x="642" y="554" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">Yes — but they <tspan font-weight="600">lag.</tspan> By the time the cross prints,</text>
  <text x="642" y="574" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">much of the move has already happened.</text>
  <text x="642" y="600" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">Useful for <tspan font-weight="600" fill="#0D5957">long-term investors</tspan> who don&#8217;t need</text>
  <text x="642" y="620" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">precise timing. Too late for active traders.</text>
</svg>
