<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" role="img" aria-labelledby="title">
  <title id="title">The 50-day and 200-day moving averages. The 50-day crosses below the 200-day, printing a death cross, and the shaded region shows price sustained below its 200-day — bear-market conditions, as in the 2020 COVID crash and the 2022 rate hikes. The 50-day later crosses back above the 200-day, printing a golden cross. Both crosses work, but both lag the move.</title>
  <rect width="1200" height="740" fill="#FBF6EE"/>

  <text x="600" y="44" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">The 50-day and 200-day moving averages</text>
  <text x="600" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">The simplest signal framework there is: above the line = bullish, below = bearish.</text>

  <!-- Shaded bear zone: where PRICE is sustained below its 200-day (x ≈ 420 → 778) -->
  <rect x="420" y="110" width="358" height="390" fill="#E09A33" opacity="0.09"/>
  <text x="599" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#E09A33">bear-market conditions</text>
  <text x="599" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#1C2826" opacity="0.6">price sustained below the 200-day</text>

  <!-- Axis -->
  <line x1="90" y1="515" x2="1130" y2="515" stroke="#1C2826" stroke-width="1.5" opacity="0.4"/>

  <!-- Price (noisy) -->
  <polyline points="90,392 150,352 200,332 250,346 300,312 350,326 400,336 450,370 500,402 550,430 600,416 650,396 700,360 750,340 800,300 850,276 900,256 950,230 1000,206 1060,176 1130,146"
            fill="none" stroke="#1C2826" stroke-width="2" opacity="0.45" stroke-linejoin="round"/>

  <!-- 200-day MA (slow) -->
  <polyline points="90,400 200,380 300,360 400,345 500,335 600,330 700,325 800,310 900,285 1000,250 1130,200"
            fill="none" stroke="#0D5957" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- 50-day MA (fast) -->
  <polyline points="90,380 200,340 300,320 400,330 500,380 600,400 700,370 800,300 900,260 1000,215 1130,160"
            fill="none" stroke="#15807D" stroke-width="3" stroke-dasharray="7 5" stroke-linejoin="round"/>

  <!-- DEATH CROSS — exact intersection of the two polylines at (425, 342.5) -->
  <circle cx="425" cy="342.5" r="9" fill="none" stroke="#E09A33" stroke-width="3"/>
  <line x1="425" y1="333" x2="425" y2="252" stroke="#E09A33" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="425" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#E09A33">DEATH CROSS</text>
  <text x="425" y="222" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#1C2826" opacity="0.7">50 crosses below 200 → bearish</text>

  <!-- GOLDEN CROSS — exact intersection at (782, 312.7) -->
  <circle cx="782" cy="312.7" r="9" fill="none" stroke="#15807D" stroke-width="3"/>
  <line x1="782" y1="322" x2="782" y2="432" stroke="#15807D" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="782" y="454" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#15807D">GOLDEN CROSS</text>
  <text x="782" y="472" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#1C2826" opacity="0.7">50 crosses back above 200 → bullish</text>

  <!-- Legend -->
  <g font-family="Inter, sans-serif" font-size="13">
    <line x1="110" y1="132" x2="142" y2="132" stroke="#1C2826" stroke-width="2" opacity="0.45"/>
    <text x="152" y="137" fill="#1C2826" opacity="0.8">Price</text>
    <line x1="110" y1="158" x2="142" y2="158" stroke="#15807D" stroke-width="3" stroke-dasharray="7 5"/>
    <text x="152" y="163" fill="#15807D" font-weight="600">50-day MA</text>
    <line x1="110" y1="184" x2="142" y2="184" stroke="#0D5957" stroke-width="3.5"/>
    <text x="152" y="189" fill="#0D5957" font-weight="600">200-day MA</text>
  </g>

  <!-- History note -->
  <rect x="90" y="548" width="510" height="164" rx="12" fill="#FFFFFF" stroke="#E6E0D5"/>
  <text x="112" y="578" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0D5957">When the S&amp;P broke its 200-day</text>
  <text x="112" y="606" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">• 2020 — the COVID crash (genuine fear)</text>
  <text x="112" y="630" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">• 2022 — the Fed raising interest rates</text>
  <text x="112" y="654" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">• tariff-driven selloffs</text>
  <text x="112" y="684" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.65">Most of the time, though, price merely <tspan font-style="italic">touches</tspan> the 200-day</text>
  <text x="112" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.65">and bounces — it is major support in a bull market.</text>

  <!-- Lag note -->
  <rect x="620" y="548" width="510" height="164" rx="12" fill="#FFFFFF" stroke="#E6E0D5"/>
  <text x="642" y="578" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0D5957">Do the crosses work?</text>
  <text x="642" y="606" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">Yes — but they <tspan font-weight="600">lag.</tspan> Notice both circles print well</text>
  <text x="642" y="626" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">after price has already turned: the death cross</text>
  <text x="642" y="646" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">after the fall began, the golden cross after the</text>
  <text x="642" y="666" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.85">recovery was under way.</text>
  <text x="642" y="694" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.75">Useful for <tspan font-weight="600" fill="#0D5957">long-term investors</tspan> who don&#8217;t need precise</text>
  <text x="642" y="710" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.75">timing. Too late for active traders.</text>
</svg>
