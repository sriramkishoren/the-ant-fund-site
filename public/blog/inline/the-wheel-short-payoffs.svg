<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title">
  <title id="title">Profit and loss at expiration for a short call and a short put</title>
  <rect width="1200" height="600" fill="#FBF6EE"/>

  <!-- Section titles -->
  <text x="300" y="50" text-anchor="middle" font-family="Fraunces, serif" font-size="28" font-weight="600" fill="#0D5957">Short call</text>
  <text x="300" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#1C2826" opacity="0.75">You collect premium; obligated to sell at strike</text>
  <text x="900" y="50" text-anchor="middle" font-family="Fraunces, serif" font-size="28" font-weight="600" fill="#0D5957">Short put</text>
  <text x="900" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#1C2826" opacity="0.75">You collect premium; obligated to buy at strike</text>

  <!-- LEFT: Short call payoff -->
  <g>
    <!-- Axes -->
    <line x1="80" y1="350" x2="540" y2="350" stroke="#1C2826" stroke-width="1.5"/>
    <line x1="80" y1="150" x2="80" y2="540" stroke="#1C2826" stroke-width="1.5"/>
    <!-- Zero P/L gridline label -->
    <text x="70" y="355" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">0</text>
    <!-- Premium line indicator -->
    <line x1="76" y1="290" x2="84" y2="290" stroke="#1C2826" stroke-width="1.5"/>
    <text x="70" y="294" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">+prem</text>
    <!-- X axis labels -->
    <text x="540" y="372" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">Stock price at expiration &#8594;</text>
    <!-- Strike marker -->
    <line x1="320" y1="150" x2="320" y2="540" stroke="#0D5957" stroke-dasharray="4 4" stroke-width="1.5" opacity="0.6"/>
    <text x="320" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#0D5957">Strike</text>

    <!-- Payoff curve: flat at +premium up to strike, then drops linearly -->
    <polyline points="80,290 320,290 540,510" fill="none" stroke="#15807D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Annotate regions -->
    <text x="200" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#15807D">Keep premium</text>
    <text x="200" y="286" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.6">(price &#8804; strike)</text>

    <text x="430" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#E09A33">Lose as price rises</text>
    <text x="430" y="446" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.6">(called away at strike)</text>

    <!-- Y axis label -->
    <text x="40" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">P/L</text>
  </g>

  <!-- RIGHT: Short put payoff -->
  <g>
    <!-- Axes -->
    <line x1="680" y1="350" x2="1140" y2="350" stroke="#1C2826" stroke-width="1.5"/>
    <line x1="680" y1="150" x2="680" y2="540" stroke="#1C2826" stroke-width="1.5"/>
    <!-- Zero P/L gridline label -->
    <text x="670" y="355" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">0</text>
    <line x1="676" y1="290" x2="684" y2="290" stroke="#1C2826" stroke-width="1.5"/>
    <text x="670" y="294" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">+prem</text>
    <!-- X axis label -->
    <text x="1140" y="372" text-anchor="end" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">Stock price at expiration &#8594;</text>
    <!-- Strike marker -->
    <line x1="920" y1="150" x2="920" y2="540" stroke="#0D5957" stroke-dasharray="4 4" stroke-width="1.5" opacity="0.6"/>
    <text x="920" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#0D5957">Strike</text>

    <!-- Payoff curve: drops linearly from low strike, flattens at +premium at and above strike -->
    <polyline points="680,510 920,290 1140,290" fill="none" stroke="#15807D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Annotate regions -->
    <text x="1030" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#15807D">Keep premium</text>
    <text x="1030" y="286" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.6">(price &#8805; strike)</text>

    <text x="780" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#E09A33">Lose as price falls</text>
    <text x="780" y="446" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.6">(assigned at strike)</text>

    <!-- Y axis label -->
    <text x="640" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">P/L</text>
  </g>

  <!-- Footer note -->
  <text x="600" y="595" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.55">Max profit = premium received. Max loss is large (call: unlimited; put: down to zero).</text>
</svg>
