<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title">
  <title id="title">The uncapped buffer trap: if the stability bucket is defined only as five years of expenses, it grows with inflation every year while total wealth may be shrinking, silently draining the growth bucket to zero over about sixteen years. The fix is to cap the buffer at 35 percent of the portfolio.</title>
  <rect width="1200" height="560" fill="#FBF6EE"/>

  <!-- Title -->
  <text x="470" y="46" text-anchor="middle" font-family="Fraunces, serif" font-size="25" font-weight="600" fill="#0D5957">The uncapped-buffer trap</text>
  <text x="470" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="13.5" fill="#1C2826" opacity="0.7">Sizing the safe bucket as "5 years of expenses" only — with no cap.</text>

  <!-- Plot area x 140..820 (year 0..16), y 110..430 -->
  <line x1="140" y1="430" x2="820" y2="430" stroke="#1C2826" stroke-width="1.5" opacity="0.55"/>
  <line x1="140" y1="110" x2="140" y2="430" stroke="#1C2826" stroke-width="1.5" opacity="0.55"/>
  <text x="128" y="430" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.6">$0</text>

  <!-- X ticks -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.6">
    <text x="140" y="450" text-anchor="middle">retire</text>
    <text x="480" y="450" text-anchor="middle">year 8</text>
    <text x="820" y="450" text-anchor="middle">year 16</text>
  </g>

  <!-- Growth bucket collapsing to zero -->
  <path d="M140 150 C 320 210, 520 300, 680 380 S 800 428, 820 430" fill="none" stroke="#E09A33" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="820" cy="430" r="6" fill="#E09A33"/>
  <text x="812" y="150" text-anchor="end" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#E09A33">Growth bucket</text>
  <text x="700" y="418" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#E09A33">drained to $0</text>

  <!-- Buffer target creeping up with inflation -->
  <path d="M140 372 C 340 366, 540 356, 820 340" fill="none" stroke="#15807D" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round"/>
  <text x="150" y="360" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#15807D">"5 years of expenses" target</text>
  <text x="150" y="392" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.65">creeps up every year with inflation →</text>

  <!-- The fix callout -->
  <rect x="880" y="120" width="280" height="300" rx="14" fill="#FFFFFF" stroke="#0D5957" stroke-width="2"/>
  <text x="1020" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#0D5957">The fix: the cap</text>
  <text x="1020" y="196" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#15807D">5 years</text>
  <text x="1020" y="222" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">— or —</text>
  <text x="1020" y="250" text-anchor="middle" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#15807D">35% of your money</text>
  <text x="1020" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0D5957">whichever is smaller.</text>
  <text x="1020" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.75">As the portfolio shrinks,</text>
  <text x="1020" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.75">the cap shrinks the buffer</text>
  <text x="1020" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.75">too — so it can't devour</text>
  <text x="1020" y="390" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.75">the growth bucket.</text>

  <!-- Bottom note -->
  <text x="470" y="510" text-anchor="middle" font-family="Inter, sans-serif" font-size="13.5" fill="#1C2826" opacity="0.8">Without the cap, a fixed dollar buffer becomes a bigger and bigger <tspan font-style="italic">share</tspan> of a shrinking pot —</text>
  <text x="470" y="532" text-anchor="middle" font-family="Inter, sans-serif" font-size="13.5" fill="#1C2826" opacity="0.8">quietly forcing more and more stock sales until there are none left.</text>
</svg>
