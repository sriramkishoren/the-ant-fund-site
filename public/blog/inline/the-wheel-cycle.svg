<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title">
  <title id="title">The Wheel strategy as a four-step repeating cycle</title>
  <rect width="1200" height="700" fill="#FBF6EE"/>

  <text x="600" y="50" text-anchor="middle" font-family="Fraunces, serif" font-size="28" font-weight="600" fill="#0D5957">The Wheel, one cycle</text>
  <text x="600" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#1C2826" opacity="0.75">Premium is collected at every step. Assignment is a planned gear-change, not a failure.</text>

  <defs>
    <marker id="cycleArrow" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#0D5957"/>
    </marker>
  </defs>

  <!-- Four station boxes at corners of a rounded square layout -->
  <!-- Station 1: top-left — Sell cash-secured put -->
  <g>
    <rect x="100" y="160" width="340" height="160" rx="14" fill="#15807D"/>
    <text x="270" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FBF6EE" opacity="0.85">STEP 1</text>
    <text x="270" y="245" text-anchor="middle" font-family="Fraunces, serif" font-size="24" font-weight="600" fill="#FBF6EE">Sell a CSP</text>
    <text x="270" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#FBF6EE" opacity="0.9">Collect premium</text>
    <text x="270" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#FBF6EE" opacity="0.9">Cash locked at strike &#215; 100</text>
  </g>

  <!-- Station 2: top-right — Assigned -->
  <g>
    <rect x="760" y="160" width="340" height="160" rx="14" fill="#E09A33"/>
    <text x="930" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1C2826" opacity="0.85">STEP 2 &#8226; If assigned</text>
    <text x="930" y="245" text-anchor="middle" font-family="Fraunces, serif" font-size="24" font-weight="600" fill="#1C2826">Own 100 shares</text>
    <text x="930" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">Cost basis = strike &#8722; premium</text>
    <text x="930" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">Was the stock you wanted</text>
  </g>

  <!-- Station 3: bottom-right — Sell covered call -->
  <g>
    <rect x="760" y="400" width="340" height="160" rx="14" fill="#0D5957"/>
    <text x="930" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FBF6EE" opacity="0.85">STEP 3</text>
    <text x="930" y="485" text-anchor="middle" font-family="Fraunces, serif" font-size="24" font-weight="600" fill="#FBF6EE">Sell a CC</text>
    <text x="930" y="518" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#FBF6EE" opacity="0.9">Strike at or above basis</text>
    <text x="930" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#FBF6EE" opacity="0.9">Collect more premium</text>
  </g>

  <!-- Station 4: bottom-left — Called away -->
  <g>
    <rect x="100" y="400" width="340" height="160" rx="14" fill="#F2C44E"/>
    <text x="270" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#1C2826" opacity="0.85">STEP 4 &#8226; If called away</text>
    <text x="270" y="485" text-anchor="middle" font-family="Fraunces, serif" font-size="24" font-weight="600" fill="#1C2826">Back to cash</text>
    <text x="270" y="518" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">Shares sold at strike</text>
    <text x="270" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">Record realized gain</text>
  </g>

  <!-- Arrows: 1 -> 2 (right) -->
  <path d="M 460 240 L 740 240" fill="none" stroke="#0D5957" stroke-width="3.5" marker-end="url(#cycleArrow)"/>
  <!-- 2 -> 3 (down) -->
  <path d="M 930 340 L 930 380" fill="none" stroke="#0D5957" stroke-width="3.5" marker-end="url(#cycleArrow)"/>
  <!-- 3 -> 4 (left) -->
  <path d="M 740 480 L 460 480" fill="none" stroke="#0D5957" stroke-width="3.5" marker-end="url(#cycleArrow)"/>
  <!-- 4 -> 1 (up — completes the cycle) -->
  <path d="M 270 380 L 270 340" fill="none" stroke="#0D5957" stroke-width="3.5" marker-end="url(#cycleArrow)"/>

  <!-- Bottom note -->
  <text x="600" y="640" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">If the put expires worthless at Step 1, skip to a fresh Step 1. If the call expires worthless at Step 3, sell another CC.</text>
  <text x="600" y="665" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">The cycle only &#8220;breaks&#8221; if you sold the original CSP on a stock you weren&#8217;t actually willing to own.</text>
</svg>
