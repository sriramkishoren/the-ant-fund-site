<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title">
  <title id="title">Safe withdrawal rate as a function of CAPE using cFIREsim formula 1.0% plus 0.5 divided by CAPE</title>
  <rect width="1200" height="620" fill="#FBF6EE"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle"
        font-family="Fraunces, serif" font-size="24" font-weight="600" fill="#0D5957">
    The CAPE-linked withdrawal rate
  </text>
  <text x="600" y="76" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">
    cFIREsim formula: SWR = 1.0% + 0.5 × (1 / CAPE). When stocks are expensive, the formula tells you to spend less.
  </text>

  <!-- Plot area: x = CAPE from 10..40 → x_px = 130..1080
       y = SWR from 1%..7%  → y_px = 510..130 (inverted) -->
  <!-- Helpers: xCAPE(c) = 130 + (c-10)/30 * 950
                ySWR(s)  = 510 - (s-1)/6 * 380 -->

  <!-- X axis -->
  <line x1="130" y1="510" x2="1080" y2="510" stroke="#1C2826" stroke-width="1.5" opacity="0.6"/>
  <!-- Y axis -->
  <line x1="130" y1="120" x2="130" y2="510" stroke="#1C2826" stroke-width="1.5" opacity="0.6"/>

  <!-- X ticks: 10, 15, 20, 25, 30, 35, 40 -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#1C2826">
    <!-- 10 → 130 -->
    <line x1="130" y1="510" x2="130" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="130" y="535" text-anchor="middle" opacity="0.7">10</text>
    <!-- 15 → 288 -->
    <line x1="288" y1="510" x2="288" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="288" y="535" text-anchor="middle" opacity="0.7">15</text>
    <!-- 20 → 447 -->
    <line x1="447" y1="510" x2="447" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="447" y="535" text-anchor="middle" opacity="0.7">20</text>
    <!-- 25 → 605 -->
    <line x1="605" y1="510" x2="605" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="605" y="535" text-anchor="middle" opacity="0.7">25</text>
    <!-- 30 → 763 -->
    <line x1="763" y1="510" x2="763" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="763" y="535" text-anchor="middle" opacity="0.7">30</text>
    <!-- 35 → 922 -->
    <line x1="922" y1="510" x2="922" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="922" y="535" text-anchor="middle" opacity="0.7">35</text>
    <!-- 40 → 1080 -->
    <line x1="1080" y1="510" x2="1080" y2="518" stroke="#1C2826" opacity="0.6"/>
    <text x="1080" y="535" text-anchor="middle" opacity="0.7">40</text>
  </g>
  <text x="605" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">CAPE (Shiller PE) →</text>

  <!-- Y ticks: 1%, 2%, 3%, 4%, 5%, 6%, 7% -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#1C2826">
    <line x1="122" y1="510" x2="130" y2="510" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="514" text-anchor="end" opacity="0.7">1%</text>
    <line x1="122" y1="447" x2="130" y2="447" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="451" text-anchor="end" opacity="0.7">2%</text>
    <line x1="122" y1="383" x2="130" y2="383" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="387" text-anchor="end" opacity="0.7">3%</text>
    <line x1="122" y1="320" x2="130" y2="320" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="324" text-anchor="end" opacity="0.7">4%</text>
    <line x1="122" y1="257" x2="130" y2="257" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="261" text-anchor="end" opacity="0.7">5%</text>
    <line x1="122" y1="193" x2="130" y2="193" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="197" text-anchor="end" opacity="0.7">6%</text>
    <line x1="122" y1="130" x2="130" y2="130" stroke="#1C2826" opacity="0.6"/>
    <text x="115" y="134" text-anchor="end" opacity="0.7">7%</text>
  </g>
  <text x="80" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#1C2826" opacity="0.7">SWR</text>

  <!-- The curve: 1.0% + 0.5/CAPE for CAPE from 10 to 40
       SWR(10)=1.0+0.5/10=1.05? wait that's wrong. 1.0% + 0.5×(1/10)=1.0+0.05=1.05? — no, 0.5 multiplied by 1/CAPE. For CAPE=10: 0.5/10=0.05=5%. Hmm wait: 0.5 × (1/10) = 0.05. But that's 0.05 in fractional terms. If we're saying 1.0% + 0.5×(1/CAPE), then 1/CAPE is unitless (e.g., 1/10 = 0.10), and 0.5 × 0.10 = 0.05 as a fraction = 5 percentage points. So SWR(10) = 1% + 5% = 6%. That matches the description.
       Sample points:
         CAPE=10 → 1 + 50/10 = 6%
         CAPE=15 → 1 + 50/15 = 4.33%
         CAPE=20 → 1 + 50/20 = 3.5%
         CAPE=25 → 1 + 50/25 = 3.0%
         CAPE=30 → 1 + 50/30 = 2.67%
         CAPE=35 → 1 + 50/35 = 2.43%
         CAPE=40 → 1 + 50/40 = 2.25%
  -->
  <path d="M 130 130
           L 288 248
           L 447 320
           L 605 383
           L 763 405
           L 922 422
           L 1080 432"
        fill="none" stroke="#15807D" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Reference markers at CAPE 15, 25, 35 -->
  <g>
    <!-- CAPE 15, SWR 4.33% → x=288, y=248 -->
    <circle cx="288" cy="248" r="6" fill="#0D5957"/>
    <line x1="288" y1="248" x2="288" y2="510" stroke="#0D5957" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
    <line x1="288" y1="248" x2="130" y2="248" stroke="#0D5957" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
    <text x="298" y="234" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0D5957">CAPE 15</text>
    <text x="298" y="250" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.7">SWR ≈ 4.3%</text>

    <!-- CAPE 25, SWR 3% → x=605, y=383 -->
    <circle cx="605" cy="383" r="6" fill="#0D5957"/>
    <line x1="605" y1="383" x2="605" y2="510" stroke="#0D5957" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
    <line x1="605" y1="383" x2="130" y2="383" stroke="#0D5957" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
    <text x="615" y="369" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0D5957">CAPE 25</text>
    <text x="615" y="385" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.7">SWR = 3.0%</text>

    <!-- Today: CAPE ~35, SWR ~2.4% → x=922, y=422 (amber) -->
    <circle cx="922" cy="422" r="8" fill="#E09A33"/>
    <line x1="922" y1="422" x2="922" y2="510" stroke="#E09A33" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5"/>
    <line x1="922" y1="422" x2="130" y2="422" stroke="#E09A33" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5"/>
    <text x="932" y="406" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#E09A33">Today (~CAPE 35)</text>
    <text x="932" y="422" font-family="Inter, sans-serif" font-size="11" fill="#1C2826" opacity="0.7">SWR ≈ 2.4%</text>
  </g>

  <!-- Shaded "elevated valuation" region: CAPE > 30 → x > 763 -->
  <g opacity="0.08">
    <rect x="763" y="120" width="317" height="390" fill="#E09A33"/>
  </g>
  <text x="921" y="158" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="11" font-weight="500"
        fill="#E09A33" letter-spacing="0.4">ELEVATED VALUATION</text>
  <text x="921" y="175" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="10" fill="#E09A33" opacity="0.7">
    (few historical observations)
  </text>

  <!-- Footnote -->
  <text x="600" y="600" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.55">
    The rate is recomputed each year and applied to the current portfolio balance, so dollar spending floats with both valuation and portfolio value.
  </text>
</svg>
