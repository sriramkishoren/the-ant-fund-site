<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title">
  <title id="title">Worst-case stress test: two retirees with identical buckets, funds, and allocation. The rigid retiree takes a full inflation raise every year and slowly bleeds toward depletion. The flexible retiree pauses raises after bad years and trims 10% when the withdrawal rate gets high, and ends nearly three times wealthier.</title>
  <rect width="1200" height="620" fill="#FBF6EE"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="600" fill="#0D5957">Flexibility beat every structural choice</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.7">Same buckets, same funds, same allocation — retiring straight into a crash and years of high inflation.</text>

  <!-- Plot area: x 130..1060 (year 0..30), y 130..470 -->
  <!-- Axes -->
  <line x1="130" y1="470" x2="1060" y2="470" stroke="#1C2826" stroke-width="1.5" opacity="0.55"/>
  <line x1="130" y1="130" x2="130" y2="470" stroke="#1C2826" stroke-width="1.5" opacity="0.55"/>
  <text x="118" y="140" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.6">portfolio</text>
  <text x="118" y="474" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.6">$0</text>

  <!-- X ticks -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#1C2826">
    <text x="130" y="492" text-anchor="middle" opacity="0.6">retire</text>
    <text x="440" y="492" text-anchor="middle" opacity="0.6">year 10</text>
    <text x="750" y="492" text-anchor="middle" opacity="0.6">year 20</text>
    <text x="1060" y="492" text-anchor="middle" opacity="0.6">year 30</text>
  </g>

  <!-- Early stress zone -->
  <rect x="130" y="130" width="180" height="340" fill="#E09A33" opacity="0.07"/>
  <text x="220" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#E09A33" opacity="0.85">crash + high inflation</text>

  <!-- Start marker -->
  <circle cx="130" cy="205" r="5" fill="#1C2826"/>
  <text x="142" y="196" font-family="Inter, sans-serif" font-size="12" fill="#1C2826" opacity="0.7">both start here ($1.5M)</text>

  <!-- Rigid line: dips then bleeds down toward depletion -->
  <path d="M130 205 C 200 250, 260 300, 310 330 S 500 400, 700 435 S 950 462, 1060 466"
        fill="none" stroke="#E09A33" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="1060" cy="466" r="6" fill="#E09A33"/>

  <!-- Flexible line: dips, recovers, climbs above start -->
  <path d="M130 205 C 200 250, 260 295, 310 315 S 520 290, 700 240 S 950 185, 1060 165"
        fill="none" stroke="#0D5957" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="1060" cy="165" r="6" fill="#0D5957"/>

  <!-- Endpoint annotations -->
  <g font-family="Inter, sans-serif">
    <text x="1048" y="150" text-anchor="end" font-size="15" font-weight="700" fill="#0D5957">Flexible plan</text>
    <text x="1048" y="132" text-anchor="end" font-size="12" fill="#1C2826" opacity="0.65">paused raises + 10% trims</text>

    <text x="1048" y="452" text-anchor="end" font-size="15" font-weight="700" fill="#E09A33">Rigid plan</text>
    <text x="1048" y="434" text-anchor="end" font-size="12" fill="#1C2826" opacity="0.65">full inflation raise every year</text>
  </g>

  <!-- 3x callout bracket -->
  <line x1="1085" y1="165" x2="1085" y2="466" stroke="#0D5957" stroke-width="1.5" opacity="0.5"/>
  <line x1="1080" y1="165" x2="1090" y2="165" stroke="#0D5957" stroke-width="1.5" opacity="0.5"/>
  <line x1="1080" y1="466" x2="1090" y2="466" stroke="#0D5957" stroke-width="1.5" opacity="0.5"/>
  <text x="1100" y="310" font-family="Fraunces, serif" font-size="22" font-weight="600" fill="#0D5957" transform="rotate(90 1100 310)" text-anchor="middle">~3× wealthier</text>

  <!-- Bottom takeaway -->
  <rect x="130" y="540" width="930" height="52" rx="10" fill="#FFFFFF" stroke="#E6E0D5"/>
  <text x="595" y="564" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#1C2826" opacity="0.85">
    <tspan font-weight="600" fill="#0D5957">The lesson:</tspan> how you <tspan font-style="italic">adjust</tspan> spending matters more than how you <tspan font-style="italic">arrange</tspan> the money.
  </text>
  <text x="595" y="583" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" fill="#1C2826" opacity="0.6">A crash is dramatic but temporary; unchecked inflation is quiet and permanent.</text>
</svg>
